<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Match-3 Puzzle Game | Play Online Free</title>
    <link rel="stylesheet" href="../assets/toast.css">
    <script src="../assets/toast.js"></script>
    <style>
        body { margin: 0; padding: 20px; background: #050510; color: #fff; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .header { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 20px; font-size: 1.5rem; font-weight: bold; color: #ff00aa; }
        .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; background: #1a1a24; padding: 8px; border-radius: 8px; box-shadow: 0 0 20px rgba(255, 0, 170, 0.2); width: 95vw; max-width: 400px; aspect-ratio: 1; }
        .gem { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: transform 0.2s; }
        .gem:hover { transform: scale(1.1); }
        .gem.selected { transform: scale(1.2); filter: brightness(1.5); }
    </style>

    <!-- SEO Meta Tags -->
    <meta name="description" content="Swap the neon gems to create cascades of 3 or more. A fast-paced, relaxing Match-3 puzzle game.">
    <meta name="keywords" content="match 3 game, gem matching puzzle, candy crush clone, free match 3, online jewel puzzle">
    <meta name="author" content="SilenVault">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://games.silenvault.com/Match3/">
    <meta property="og:title" content="Neon Match-3 Puzzle Game | Play Online Free">
    <meta property="og:description" content="Swap the neon gems to create cascades of 3 or more. A fast-paced, relaxing Match-3 puzzle game.">
    <meta property="og:image" content="https://games.silenvault.com/assets/og-match3.png">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://games.silenvault.com/Match3/">
    <meta property="twitter:title" content="Neon Match-3 Puzzle Game | Play Online Free">
    <meta property="twitter:description" content="Swap the neon gems to create cascades of 3 or more. A fast-paced, relaxing Match-3 puzzle game.">
    <meta property="twitter:image" content="https://games.silenvault.com/assets/og-match3.png">
</head>
    <svg width="0" height="0" style="position:absolute">
        <defs>
            <radialGradient id="grad0" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#ffb3cc"/><stop offset="100%" stop-color="#ff0055"/></radialGradient>
            <radialGradient id="grad1" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#b3f0ff"/><stop offset="100%" stop-color="#0099cc"/></radialGradient>
            <radialGradient id="grad2" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#b3ffb3"/><stop offset="100%" stop-color="#00aa00"/></radialGradient>
            <radialGradient id="grad3" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#ffffb3"/><stop offset="100%" stop-color="#ddaa00"/></radialGradient>
            <radialGradient id="grad4" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#e6b3ff"/><stop offset="100%" stop-color="#8800cc"/></radialGradient>
        </defs>
    </svg>

    <div class="header">
        <span>SCORE</span>
        <span id="score">0</span>
    </div>
    <div id="grid" class="grid"></div>

    <script>
        const gridEl = document.getElementById('grid');
        const scoreEl = document.getElementById('score');
        const size = 8;
        
        const GEM_SHAPES = [
            // 0: Ruby (Octagon)
            `<svg viewBox="0 0 100 100" style="width:100%;height:100%;filter:drop-shadow(0 0 5px #ff0055);"><polygon points="30,10 70,10 90,30 90,70 70,90 30,90 10,70 10,30" fill="url(#grad0)" stroke="#ffb3cc" stroke-width="2"/><polygon points="30,10 70,10 50,35" fill="rgba(255,255,255,0.6)"/><polygon points="10,30 30,10 50,35 25,50" fill="rgba(255,255,255,0.3)"/></svg>`,
            // 1: Sapphire (Diamond)
            `<svg viewBox="0 0 100 100" style="width:100%;height:100%;filter:drop-shadow(0 0 5px #00d2ff);"><polygon points="50,5 95,50 50,95 5,50" fill="url(#grad1)" stroke="#b3f0ff" stroke-width="2"/><polygon points="50,5 95,50 50,50" fill="rgba(255,255,255,0.5)"/><polygon points="5,50 50,5 50,50" fill="rgba(255,255,255,0.2)"/></svg>`,
            // 2: Emerald (Hexagon)
            `<svg viewBox="0 0 100 100" style="width:100%;height:100%;filter:drop-shadow(0 0 5px #00ff00);"><polygon points="25,10 75,10 95,50 75,90 25,90 5,50" fill="url(#grad2)" stroke="#b3ffb3" stroke-width="2"/><polygon points="25,10 75,10 50,25" fill="rgba(255,255,255,0.6)"/><polygon points="5,50 25,10 50,25 25,50" fill="rgba(255,255,255,0.3)"/></svg>`,
            // 3: Topaz (Kite)
            `<svg viewBox="0 0 100 100" style="width:100%;height:100%;filter:drop-shadow(0 0 5px #ffff00);"><polygon points="50,5 90,35 50,95 10,35" fill="url(#grad3)" stroke="#ffffb3" stroke-width="2"/><polygon points="50,5 90,35 50,45" fill="rgba(255,255,255,0.6)"/></svg>`,
            // 4: Amethyst (Round Faceted)
            `<svg viewBox="0 0 100 100" style="width:100%;height:100%;filter:drop-shadow(0 0 5px #aa00ff);"><circle cx="50" cy="50" r="45" fill="url(#grad4)" stroke="#e6b3ff" stroke-width="2"/><polygon points="35,20 65,20 80,50 65,80 35,80 20,50" fill="rgba(255,255,255,0.2)"/><polygon points="35,20 65,20 50,40" fill="rgba(255,255,255,0.5)"/></svg>`
        ];

        let board = [], score = 0, selected = null, isAnimating = false;

        function init() {
            gridEl.innerHTML = '';
            for(let r=0; r<size; r++) {
                board[r] = [];
                for(let c=0; c<size; c++) {
                    let type;
                    do { type = Math.floor(Math.random() * 5); } 
                    while ((r>=2 && board[r-1][c].type===type && board[r-2][c].type===type) || 
                           (c>=2 && board[r][c-1].type===type && board[r][c-2].type===type));
                    board[r][c] = { type, el: createGem(r, c, type) };
                }
            }
        }

        function createGem(r, c, type) {
            const el = document.createElement('div');
            el.className = 'gem';
            el.innerHTML = GEM_SHAPES[type];
            el.onclick = () => selectGem(r, c);
            gridEl.appendChild(el);
            return el;
        }

        function updateGemEl(el, type) {
            if (type === null) {
                el.innerHTML = '';
            } else {
                el.innerHTML = GEM_SHAPES[type];
            }
        }

        async function selectGem(r, c) {
            if(isAnimating) return;
            if(!selected) {
                selected = {r, c};
                board[r][c].el.classList.add('selected');
            } else {
                board[selected.r][selected.c].el.classList.remove('selected');
                const isAdjacent = Math.abs(selected.r - r) + Math.abs(selected.c - c) === 1;
                if(isAdjacent) {
                    await swap(selected.r, selected.c, r, c);
                    const matches = findMatches();
                    if(matches.length > 0) {
                        await processMatches();
                    } else {
                        await swap(selected.r, selected.c, r, c); // swap back
                    }
                }
                selected = null;
            }
        }

        async function swap(r1, c1, r2, c2) {
            const tempType = board[r1][c1].type;
            board[r1][c1].type = board[r2][c2].type;
            updateGemEl(board[r1][c1].el, board[r2][c2].type);
            board[r2][c2].type = tempType;
            updateGemEl(board[r2][c2].el, tempType);
            await new Promise(res => setTimeout(res, 200));
        }

        function findMatches() {
            const matches = new Set();
            // Horizontal
            for(let r=0; r<size; r++) {
                for(let c=0; c<size-2; c++) {
                    const type = board[r][c].type;
                    if(type !== null && board[r][c+1].type===type && board[r][c+2].type===type) {
                        matches.add(`${r},${c}`); matches.add(`${r},${c+1}`); matches.add(`${r},${c+2}`);
                    }
                }
            }
            // Vertical
            for(let c=0; c<size; c++) {
                for(let r=0; r<size-2; r++) {
                    const type = board[r][c].type;
                    if(type !== null && board[r+1][c].type===type && board[r+2][c].type===type) {
                        matches.add(`${r},${c}`); matches.add(`${r+1},${c}`); matches.add(`${r+2},${c}`);
                    }
                }
            }
            return Array.from(matches).map(m => { const pts=m.split(','); return {r: parseInt(pts[0]), c: parseInt(pts[1])}; });
        }

        async function processMatches() {
            isAnimating = true;
            let matches = findMatches();
            while(matches.length > 0) {
                // Remove matches
                matches.forEach(({r, c}) => {
                    board[r][c].type = null;
                    updateGemEl(board[r][c].el, null);
                    score += 10;
                });
                scoreEl.innerText = score;
                await new Promise(res => setTimeout(res, 300));
                
                // Drop gems
                for(let c=0; c<size; c++) {
                    let emptySlots = 0;
                    for(let r=size-1; r>=0; r--) {
                        if(board[r][c].type === null) emptySlots++;
                        else if(emptySlots > 0) {
                            board[r+emptySlots][c].type = board[r][c].type;
                            updateGemEl(board[r+emptySlots][c].el, board[r][c].type);
                            board[r][c].type = null;
                            updateGemEl(board[r][c].el, null);
                        }
                    }
                    // Refill top
                    for(let r=0; r<emptySlots; r++) {
                        board[r][c].type = Math.floor(Math.random() * 5);
                        updateGemEl(board[r][c].el, board[r][c].type);
                    }
                }
                await new Promise(res => setTimeout(res, 300));
                matches = findMatches();
            }
            isAnimating = false;
            
            // Win condition check
            if (score >= 1000) {
                let hs = parseInt(localStorage.getItem('match3_score') || '0');
                if(score > hs) localStorage.setItem('match3_score', score);
                if(window.showToast) window.showToast("CASCADING VICTORY", "#ff00aa");
                setTimeout(() => { score=0; scoreEl.innerText='0'; init(); }, 3000);
            }
        }

        init();
    </script>
</body>
</html>
