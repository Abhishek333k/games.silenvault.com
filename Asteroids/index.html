    <div id="game-container">

    <!-- NATIVE MOBILE TOUCH ZONE CONTROLLER (Phase 2) -->
    <script src="../assets/touch_zones.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
         const gameArea = document.querySelector('canvas') || document.body;
         const zones = [{rect: {x:0, y:0, w:0.33, h:1}, key: 'ArrowLeft', code: 37}, {rect: {x:0.67, y:0, w:0.33, h:1}, key: 'ArrowRight', code: 39}, {rect: {x:0.33, y:0, w:0.34, h:0.5}, key: 'ArrowUp', code: 38}, {rect: {x:0.33, y:0.5, w:0.34, h:0.5}, key: ' ', code: 32}];
         new window.TouchZoneController(gameArea, zones);
      });
    </script>
