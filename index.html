<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Free Web Games | Puzzle, Arcade & Strategy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.8s ease;
        }

        /* Dynamic Background Nebula */
        .nebula-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            z-index: -1;
            filter: blur(80px);
            transition: all 1s ease;
        }

        header {
            padding: 5rem 0 3rem;
            text-align: center;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 3rem;
            letter-spacing: 1.2rem;
            font-weight: 700;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            margin-bottom: 0.5rem;
        }

        .system-status {
            font-size: 0.7rem;
            letter-spacing: 0.5rem;
            opacity: 0.4;
            text-transform: uppercase;
        }

        #game-vault {
            display: flex;
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .game-tile {
            position: relative;
            width: 320px;
            height: 500px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .game-tile:hover {
            transform: scale(1.05) translateY(-10px);
            border-color: var(--game-color);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 30px var(--game-color-alpha);
        }

        .tile-art {
            height: 60%;
            width: 100%;
            background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.8) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .tile-art i {
            font-size: 4rem;
            filter: drop-shadow(0 0 15px var(--game-color));
        }

        .tile-content {
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .game-title {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
        }

        .game-meta {
            font-size: 0.7rem;
            letter-spacing: 0.1rem;
            opacity: 0.5;
            margin-top: 0.3rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .game-desc {
            font-size: 0.8rem;
            line-height: 1.6;
            opacity: 0.7;
            margin-bottom: 2rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .game-records {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .record-item {
            font-size: 0.65rem;
            letter-spacing: 0.1rem;
            margin-bottom: 0.5rem;
            color: var(--game-color);
            font-weight: 900;
        }

        .play-hint {
            font-size: 0.8rem;
            font-weight: 900;
            letter-spacing: 0.3rem;
            color: var(--game-color);
            text-align: right;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .game-tile:hover .play-hint {
            opacity: 1;
            transform: translateX(0);
        }

        footer {
            margin-top: auto;
            padding: 3rem;
            opacity: 0.2;
            font-size: 0.6rem;
            letter-spacing: 0.3rem;
        }

        /* Search & Filter UI */
        .controls-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        .search-box {
            width: 90%;
            max-width: 600px;
            padding: 1rem 1.5rem;
            background: rgba(10, 10, 15, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: white;
            font-size: 1.2rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-align: center;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.1rem;
        }

        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            background: rgba(10, 10, 15, 0.9);
        }

        .category-filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            width: 90%;
        }

        .filter-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #aaa;
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8rem;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
        }

        .filter-pill:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .filter-pill.active {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
            font-weight: bold;
            box-shadow: 0 0 15px var(--accent);
        }
    </style>

    <script>

                desc: 'Keep your core burning in an obsidian frost-void. Every second drains your heat. Absorb frost shards to fuel your fire, but avoid the freezing touch of the Obsidian Sentinels.',

            {

            {
                id: 'orbitterminal',

                desc: 'Master the laws of orbital mechanics. Click and drag to launch your craft into the deep void. Use the gravitational pull of planets to curve your path toward the target node.',

            {

                tagline: 'DEEP SEA ODYSSEY',
                color: '#00e5ff',
                colorAlpha: 'rgba(0, 229, 255, 0.3)',
                icon: '❄',
                path: 'Lumina/index.html',
                desc: 'Guide your bioluminescent probe through the deep ocean abyss. Collect glow-shards to sustain your fading power reserve while evading shadow creatures.',
                stats: [{ label: 'MAX DEPTH', key: 'lumina_high_score' }]
            },
            {
                id: 'bitbeat',
                title: 'Bit-Beat',
                tagline: 'RHYTHM RUNNER',
                color: '#ff007f',
                colorAlpha: 'rgba(255, 0, 127, 0.3)',
                icon: '⚡',
                path: 'Bit-Beat/index.html',
                desc: 'Boot the digital audio sequence stream. Dodge neon gate obstacles in perfect synchronization with synthesized high-frequency kick-drum loops.',
                stats: [{ label: 'DATA CAPTURED', key: 'bitbeat_high_score' }]
            },
            {

                title: 'Dino Runner',
                tagline: 'OFFLINE ARCHIVE',
                color: '#aaaaaa',
                colorAlpha: 'rgba(170, 170, 170, 0.3)',
                icon: '🦖',
                path: 'DinoRunner/index.html',
                desc: 'A preserved archive of the classic T-Rex runner. Boot up this offline artifact to jump over ancient cacti and survive the desert wasteland.',
                stats: [{ label: 'TOP SCORE', key: 'runner_highest_score' }]
            },
            {

                color: '#edc22e',

                icon: '⊞',
                path: 'Game-2048/index.html',
                desc: 'The original mathematical sliding block puzzle. Slide tiles on a grid to combine them and create a tile with the number 2048.',
                stats: [{ label: 'BEST SCORE', key: 'bestScore' }]
            },
            {
                id: 'tetris',
                title: 'Tetris',
                tagline: 'BLOCK STACKER',
                color: '#ff3366',
                colorAlpha: 'rgba(255, 51, 102, 0.3)',
                icon: '🧱',

            {

            {

                color: '#ff0055',

                icon: '☀',
                path: 'Minesweeper/index.html',

                stats: [{ label: 'BEST TIME', key: 'minesweeper_score' }]
            },
            {
                id: 'match3',
                title: 'Neon Match-3',
                tagline: 'CASCADING GEMS',
                color: '#aa00ff',
                colorAlpha: 'rgba(170, 0, 255, 0.3)',
                icon: '✧',
                path: 'Match3/index.html',
                desc: 'Swap neon gems to create massive chain reactions. A highly responsive puzzle matching game.',
                stats: [{ label: 'HIGH SCORE', key: 'match3_score' }]
            },
            {
                id: 'solitaire',
                title: 'Klondike Solitaire',

                color: '#00ffaa',
                colorAlpha: 'rgba(0, 255, 170, 0.3)',
                icon: '♠',
                path: 'Solitaire/index.html',
                desc: 'The legendary relaxing card game, fully rebuilt with smooth tap mechanics and a premium aesthetic.',
                stats: []
            },
            {
                id: 'bounce',
                title: 'Bounce',
                tagline: 'RED BALL RUNNER',
                color: '#ff0000',
                colorAlpha: 'rgba(255, 0, 0, 0.3)',
                icon: '⚽',
                path: 'Bounce/index.html',
                desc: 'Navigate the endless retro platformer as a bouncing red ball, dodging spikes and making leaps of faith.',
                stats: [{ label: 'MAX LEVEL', key: 'bounce_level' }]
            }
        ];

        const CATEGORY_MAP = {
            'aetheria': 'logic', 'vipergrid': 'arcade', 'igniszero': 'arcade', 
            'shiftprotocol': 'logic', 'orbitterminal': 'logic', 'prismshift': 'logic',
            'mnemonic': 'logic', 'lumina': 'arcade', 'bitbeat': 'arcade',
            'dinorunner': 'retro', 'game2048': 'logic', 'tetris': 'retro',
            'asteroids': 'retro', 'floppybird': 'arcade', 'snake': 'retro',
            'spaceinvaders': 'retro', 'pacman': 'retro', 'pong': 'retro',
            'minesweeper': 'logic', 'match3': 'logic', 'solitaire': 'logic',
            'bounce': 'arcade'
        };

        GAMES.forEach(g => g.category = CATEGORY_MAP[g.id] || 'retro');

        let currentSearch = '';
        let currentCategory = 'all';

        function renderVault() {
            const vault = document.getElementById('game-vault');
            const nebula = document.getElementById('nebula');

            const filteredGames = GAMES.filter(game => {
                const matchesSearch = game.title.toLowerCase().includes(currentSearch) || 
                                      game.desc.toLowerCase().includes(currentSearch) ||
                                      game.tagline.toLowerCase().includes(currentSearch);
                const matchesCategory = currentCategory === 'all' || game.category === currentCategory;
                return matchesSearch && matchesCategory;
            });

            if (filteredGames.length === 0) {
                vault.innerHTML = `<div style="text-align: center; width: 100%; padding: 4rem; color: #555; letter-spacing: 0.2rem;">NO DATABANKS MATCHING QUERY</div>`;
                return;
            }

            vault.innerHTML = filteredGames.map(game => {
                const statsHtml = game.stats.map(s => `
                    <div class="record-item">${s.label}: ${localStorage.getItem(s.key) || '0'}</div>
                `).join('');

                return `
                    <a href="${game.path}" class="game-tile" 
                       style="--game-color: ${game.color}; --game-color-alpha: ${game.colorAlpha}"
                       onmouseenter="updateBg('${game.color}')"
                       onmouseleave="resetBg()">
                        <div class="tile-art">
                            <span style="font-size: 5rem; filter: drop-shadow(0 0 20px ${game.color})">${game.icon}</span>
                        </div>
                        <div class="tile-content">
                            <div>
                                <div class="game-title">${game.title}</div>
                                <div class="game-meta">${game.tagline}</div>
                                <div class="game-desc">${game.desc}</div>
                                <div class="game-records">${statsHtml}</div>
                            </div>
                            <div class="play-hint">PLAY MISSION</div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        // Setup Event Listeners
        document.getElementById('search-input').addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase();
            renderVault();
        });

        document.querySelectorAll('.filter-pill').forEach(pill => {
            pill.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.getAttribute('data-category');
                renderVault();
            });
        });

        function updateBg(color) {
            document.getElementById('nebula').style.background = `
                radial-gradient(circle at 50% 50%, ${color}22 0%, transparent 70%)
            `;
            document.body.style.background = '#020205';
        }

        function resetBg() {
            document.getElementById('nebula').style.background = '';
            document.body.style.background = '';
        }

        renderVault();
    </script>
</body>
</html>
